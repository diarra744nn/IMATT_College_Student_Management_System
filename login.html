<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMATT College | Portal Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="logo-top-container">
            <img src="ic.png" alt="IMATT College Logo" class="college-logo-top">
        </div>

        <div class="brand-header">
            <h2>IMATT COLLEGE</h2>
            <h4>Student Management System</h4>
            <p class="motto">"Education is the source of human progress"</p>
        </div>
        
        <form id="loginForm">
            <div class="input-container">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="email" required placeholder="Enter Email or Username">
            </div>
            
            <div class="input-container">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="password" required placeholder="Password">
            </div>
            
            <button type="submit" class="btn btn-signin">
                Sign In to Portal <i class="fa-solid fa-arrow-right-long btn-arrow"></i>
            </button>
            <div id="errorMessage" class="error-msg"></div>
        </form>

        <footer class="card-footer">
            <p>Affiliated with <strong>Universities of Sierra Leone-FBC, IPAM, COHMAS</strong></p>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
